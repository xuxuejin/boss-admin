services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: flask-boss-app
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      APP_ENV: development
      SECRET_KEY: dev-secret-key
      JWT_SECRET_KEY: dev-jwt-secret-key
      SQLALCHEMY_DATABASE_URI: mysql+pymysql://flask_boss:flask_boss@mysql:3306/flask_boss
      REDIS_URI: redis://redis:6379/0
      LOG_LEVEL: DEBUG
      LOG_DIR: logs
      REQUEST_ID_HEADER: X-Request-ID
      SLOW_REQUEST_THRESHOLD_MS: 1000
      BABEL_DEFAULT_LOCALE: zh
      GUNICORN_BIND: 0.0.0.0:3001
      GUNICORN_WORKERS: 2
      GUNICORN_THREADS: 2
      GUNICORN_TIMEOUT: 60
      GUNICORN_GRACEFUL_TIMEOUT: 30
      GUNICORN_KEEPALIVE: 5
      GUNICORN_LOG_LEVEL: info
    ports:
      - "3001:3001"
    volumes:
      - ./logs:/app/logs
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3001/api/health/ready"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

  mysql:
    image: mysql:8.4
    container_name: flask-boss-mysql
    environment:
      MYSQL_DATABASE: flask_boss
      MYSQL_USER: flask_boss
      MYSQL_PASSWORD: flask_boss
      MYSQL_ROOT_PASSWORD: root
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-proot"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  redis:
    image: redis:7.2-alpine
    container_name: flask-boss-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

volumes:
  mysql_data:
  redis_data:
