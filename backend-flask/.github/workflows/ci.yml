name: CI

on:
  push:
    branches: ["main", "master"]
  pull_request:

jobs:
  lint-test-build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Setup uv
        uses: astral-sh/setup-uv@v5

      - name: Install dependencies
        run: |
          uv sync --group dev
          uv pip install -e .

      - name: Ruff check
        run: uv run ruff check .

      - name: Ruff format check
        run: uv run ruff format . --check

      - name: Mypy
        run: uv run mypy app

      - name: Test
        run: uv run pytest

      - name: Build Docker image
        run: docker build -t flask-boss:ci .
